server {
    listen ${PORT};
    server_name _;

    root /app/web;
    index index.html;

    # Flutter entry point — must be explicit so it isn't proxied to FastAPI
    location = / {
        try_files /index.html =404;
    }

    # Flutter static assets — serve directly from disk by file extension
    location ~* \.(js|css|png|jpg|jpeg|ico|json|woff2?|ttf|svg|map|html|wasm)$ {
        try_files $uri =404;
    }

    # Flutter asset directories
    location ^~ /icons/     { try_files $uri =404; }
    location ^~ /assets/    { try_files $uri =404; }
    location ^~ /canvaskit/ { try_files $uri =404; }

    # Everything else → FastAPI backend.
    # No whitelist needed — new API routes work automatically.
    location / {
        rewrite ^(.+)/$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

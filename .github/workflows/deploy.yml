name: Deploy to Cloud Run

# Deploys ONLY when you manually click "Run workflow" in the Actions tab.
# Nothing auto-deploys — no push or tag triggers a deploy.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation (keyless auth)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # WIF identifiers below are NOT secrets — they are non-sensitive GCP
      # resource names. No credentials are stored. App secrets stay in
      # Google Secret Manager (pulled at deploy time, see the deploy step).
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1090496405720/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: gh-deployer@fednowrtppayrails.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: fednowrtppayrails

      - name: Deploy + route traffic
        run: |
          gcloud run deploy payrails --source . --project fednowrtppayrails --region us-east1 --platform managed --allow-unauthenticated --min-instances=1 --add-cloudsql-instances fednowrtppayrails:us-east1:payrails-db --set-env-vars SEED_DATA=false,DATABASE_URL=$(gcloud secrets versions access latest --secret=payrails-database-url --project fednowrtppayrails),JWT_SECRET=$(gcloud secrets versions access latest --secret=payrails-jwt-secret --project fednowrtppayrails),ENCRYPTION_KEY=$(gcloud secrets versions access latest --secret=payrails-encryption-key --project fednowrtppayrails),STABLECOIN_WEBHOOK_SECRET=$(gcloud secrets versions access latest --secret=payrails-stablecoin-webhook-secret --project fednowrtppayrails),STABLECOIN_WORKER_SECRET=$(gcloud secrets versions access latest --secret=payrails-stablecoin-worker-secret --project fednowrtppayrails)
          gcloud run services update-traffic payrails --to-latest --project fednowrtppayrails --region us-east1
